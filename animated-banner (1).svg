<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#00F0FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1584" height="396" fill="url(#bg)"/>

  <g stroke="#1B2A4A" stroke-width="1" opacity="0.4">
    <line x1="0" y1="330" x2="1584" y2="330"/>
    <line x1="0" y1="350" x2="1584" y2="350"/>
    <line x1="0" y1="370" x2="1584" y2="370"/>
  </g>

  <g opacity="0.7">
    <circle cx="120" cy="80" r="2.5" fill="#00F0FF">
      <animate attributeName="cy" values="380;40;380" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="150" r="2" fill="#8B7FFF">
      <animate attributeName="cy" values="396;20;396" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="60" r="1.8" fill="#00F0FF">
      <animate attributeName="cy" values="396;10;396" dur="7.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="7.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1180" cy="100" r="2.2" fill="#00F0FF">
      <animate attributeName="cy" values="396;30;396" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1320" cy="180" r="2" fill="#8B7FFF">
      <animate attributeName="cy" values="396;40;396" dur="8.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="8.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1450" cy="70" r="2.4" fill="#00F0FF">
      <animate attributeName="cy" values="396;20;396" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="120" r="1.6" fill="#8B7FFF">
      <animate attributeName="cy" values="396;15;396" dur="9.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="9.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(792,150)">
    <circle r="70" fill="url(#coreGlow)">
      <animate attributeName="r" values="65;78;65" dur="4s" repeatCount="indefinite"/>
    </circle>
    <g stroke="#00F0FF" stroke-width="1.2" fill="none" opacity="0.85" filter="url(#glow)">
      <circle r="46">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
      </circle>
      <polygon points="0,-46 40,23 -40,23">
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="20s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="0,46 40,-23 -40,-23">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="26s" repeatCount="indefinite"/>
      </polygon>
    </g>
    <circle r="6" fill="#FFFFFF">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#glow)" text-anchor="middle">
    <text x="792" y="315" font-size="60" font-weight="700" fill="#00F0FF" letter-spacing="4">
      VICTOR VENGATESH
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
    </text>
  </g>
  <text x="792" y="350" font-family="Arial, sans-serif" font-size="20" fill="#B9C2D0" letter-spacing="3" text-anchor="middle">
    AI &amp; MACHINE LEARNING ENGINEER
  </text>

  <g font-family="Arial, sans-serif" font-size="14" fill="#7F8CA6" text-anchor="middle">
    <text x="792" y="378">PYTHON · TENSORFLOW · PYTORCH · MULTI-AGENT AI SYSTEMS</text>
  </g>
</svg>
